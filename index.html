<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Newsletter tech diario para LATAM">
  <title>El Filtro — Newsletter Tech Diario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f4f4f0;
      --bg-header: #0a0a0a;
      --text-primary: #0f0f0f;
      --text-secondary: #555;
      --text-tertiary: #999;
      --accent: #22d3ee;
      --accent-dark: #0891b2;
      --border: #e5e5e0;
      --shadow: rgba(0,0,0,0.06);
      --card-radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #111111;
        --bg-secondary: #1a1a1a;
        --bg-header: #000000;
        --text-primary: #f0f0f0;
        --text-secondary: #aaa;
        --text-tertiary: #555;
        --border: #2a2a2a;
        --shadow: rgba(0,0,0,0.4);
      }
    }

    body.light-mode {
      --bg-primary: #ffffff;
      --bg-secondary: #f4f4f0;
      --bg-header: #0a0a0a;
      --text-primary: #0f0f0f;
      --text-secondary: #555;
      --text-tertiary: #999;
      --border: #e5e5e0;
      --shadow: rgba(0,0,0,0.06);
    }

    body.dark-mode {
      --bg-primary: #111111;
      --bg-secondary: #1a1a1a;
      --bg-header: #000000;
      --text-primary: #f0f0f0;
      --text-secondary: #aaa;
      --text-tertiary: #555;
      --border: #2a2a2a;
      --shadow: rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg-header);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-dot { color: var(--accent); }

    .logo-tag {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Inter', monospace;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-date {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      text-transform: capitalize;
    }

    .icon-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      color: #fff;
    }

    .icon-btn:hover { background: rgba(255,255,255,0.15); }

    .menu-btn { display: none; }

    /* ── LAYOUT ── */
    .layout {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 2rem;
      padding: 2rem;
    }

    /* ── CONTENT ── */
    .content { display: flex; flex-direction: column; gap: 1.25rem; }

    /* ── HERO (historia) ── */
    .hero {
      background: var(--bg-primary);
      border-radius: var(--card-radius);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .hero-body { padding: 2.5rem; }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-dark);
      margin-bottom: 1.25rem;
    }

    .section-tag::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      letter-spacing: -0.5px;
    }

    .hero p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 0.9rem;
    }

    .hero-footer {
      padding: 1.25rem 2.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .source-chip {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .read-more:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── RADAR ── */
    .radar-card {
      background: var(--bg-primary);
      border-radius: var(--card-radius);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    .card-header {
      padding: 1.5rem 1.75rem 0;
    }

    .radar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 0;
    }

    .radar-item {
      padding: 1.5rem 1.75rem;
      border-right: 1px solid var(--border);
      border-top: 1px solid var(--border);
      transition: background 0.2s;
    }

    .radar-item:hover { background: var(--bg-secondary); }

    .radar-item:last-child { border-right: none; }

    .item-source {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent-dark);
      background: rgba(34,211,238,0.08);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 0.75rem;
    }

    .radar-item h3 {
      font-size: 0.975rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 0.6rem;
    }

    .radar-item p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 0.75rem;
    }

    .radar-item a {
      font-size: 0.8rem;
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 600;
    }

    .radar-item a:hover { text-decoration: underline; }

    /* ── DATO + SIN FILTRO row ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      animation: fadeUp 0.4s ease 0.2s both;
    }

    .dato-card, .sinfiltro-card {
      background: var(--bg-primary);
      border-radius: var(--card-radius);
      border: 1px solid var(--border);
      padding: 1.75rem;
    }

    .dato-number {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent-dark);
      line-height: 1;
      margin: 1rem 0 0.75rem;
    }

    .dato-context {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .sinfiltro-text {
      margin-top: 1rem;
      font-size: 0.975rem;
      color: var(--text-secondary);
      line-height: 1.8;
      font-style: italic;
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 80px;
      height: fit-content;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      background: var(--bg-primary);
      border-radius: var(--card-radius);
      border: 1px solid var(--border);
      padding: 1.25rem;
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-tertiary);
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .month-group { margin-bottom: 1rem; }

    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.5rem;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.8rem;
      border-radius: 6px;
      user-select: none;
      transition: background 0.15s;
    }

    .month-header:hover { background: var(--bg-secondary); color: var(--text-primary); }

    .month-toggle { transition: transform 0.2s; font-size: 0.65rem; }
    .month-toggle.collapsed { transform: rotate(-90deg); }

    .newsletter-list { padding: 0.25rem 0 0 0.5rem; }
    .newsletter-list.collapsed { display: none; }

    .newsletter-item {
      display: block;
      padding: 0.45rem 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.82rem;
      transition: all 0.15s;
      margin-bottom: 0.15rem;
      cursor: pointer;
    }

    .newsletter-item:hover { background: var(--bg-secondary); color: var(--text-primary); }

    .newsletter-item.active {
      background: rgba(34,211,238,0.1);
      color: var(--accent-dark);
      font-weight: 600;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── SCROLLBAR ── */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; top: 0; max-height: none; display: none; }
      .sidebar.open { display: block; }
      .menu-btn { display: flex; }
      .header-date { display: none; }
    }

    @media (max-width: 768px) {
      .bottom-row { grid-template-columns: 1fr; }
      .radar-grid { grid-template-columns: 1fr; }
      .radar-item { border-right: none; }
      .hero h2 { font-size: 1.6rem; }
      .dato-number { font-size: 2.25rem; }
    }

    @media (max-width: 640px) {
      .layout { padding: 1rem; gap: 1rem; }
      .hero-body { padding: 1.5rem; }
      .hero-footer { padding: 1rem 1.5rem; flex-direction: column; gap: 0.75rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <h1>El Filtro <span class="logo-dot">•</span></h1>
        <span class="logo-tag">Tech diario</span>
      </div>
      <div class="header-right">
        <span class="header-date" id="header-date"></span>
        <button class="icon-btn" onclick="toggleTheme()" aria-label="Cambiar tema">
          <span class="theme-icon">🌙</span>
        </button>
        <button class="icon-btn menu-btn" onclick="toggleSidebar()" aria-label="Archivo">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <main class="content" id="newsletter-content">
      <div class="loading">
        <div class="loading-spinner"></div>
        Cargando newsletter...
      </div>
    </main>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">Archivo</div>
      <div id="archive"></div>
    </aside>
  </div>

  <script>
    const REPO_OWNER = 'ignaciobernardelli';
    const REPO_NAME  = 'elfiltro-technews';
    const DATA_PATH  = 'data';

    let newsletters = [];
    let currentNewsletter = null;

    // Theme
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

    function applyTheme(t) {
      document.body.className = t + '-mode';
      const icon = document.querySelector('.theme-icon');
      if (icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const next = document.body.className.includes('dark') ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Fetch list
    async function fetchNewsletters() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`);
        if (!res.ok) throw new Error();
        const files = await res.json();

        newsletters = files
          .filter(f => f.name.endsWith('.json'))
          .map(f => {
            const m = f.name.match(/(\d{4})-(\d{2})-(\d{2})\.json/);
            if (!m) return null;
            const [, y, mo, d] = m;
            const date = new Date(y, mo - 1, d);
            return {
              name: f.name,
              download_url: f.download_url,
              date,
              displayDate: date.toLocaleDateString('es-AR', { day: 'numeric', month: 'short', year: 'numeric' })
            };
          })
          .filter(Boolean)
          .sort((a, b) => b.date - a.date);

        if (newsletters.length) {
          buildArchive();
          loadNewsletter(newsletters[0]);
        } else {
          showMessage('No hay newsletters disponibles.');
        }
      } catch {
        showMessage('Error cargando newsletters.');
      }
    }

    async function loadNewsletter(nl) {
      currentNewsletter = nl;
      document.getElementById('newsletter-content').innerHTML =
        '<div class="loading"><div class="loading-spinner"></div>Cargando...</div>';

      try {
        const res = await fetch(nl.download_url);
        if (!res.ok) throw new Error();
        const data = await res.json();
        renderNewsletter(data, nl);
        document.getElementById('header-date').textContent = data.dateDisplay || nl.displayDate;
        document.querySelectorAll('.newsletter-item').forEach(el => {
          el.classList.toggle('active', el.dataset.name === nl.name);
        });
      } catch {
        showMessage('Error cargando newsletter.');
      }
    }

    function renderNewsletter(data, nl) {
      const { historia = {}, radar = [], dato = {}, sin_filtro = '' } = data;
      let html = '';

      if (historia.titulo) {
        html += `
          <article class="hero">
            <div class="hero-body">
              <div class="section-tag">La historia del día</div>
              <h2>${esc(historia.titulo)}</h2>
              ${[historia.parrafo1, historia.parrafo2, historia.parrafo3]
                .filter(Boolean).map(p => `<p>${esc(p)}</p>`).join('')}
            </div>
            ${historia.url ? `
            <div class="hero-footer">
              <span class="source-chip">${esc(historia.source || 'Fuente')}</span>
              <a href="${esc(historia.url)}" class="read-more" target="_blank" rel="noopener">
                Leer artículo <span>→</span>
              </a>
            </div>` : ''}
          </article>`;
      }

      if (radar.length) {
        html += `
          <div class="radar-card">
            <div class="card-header">
              <div class="section-tag">En el radar</div>
            </div>
            <div class="radar-grid">
              ${radar.map(item => `
                <div class="radar-item">
                  ${item.source ? `<span class="item-source">${esc(item.source)}</span>` : ''}
                  <h3>${esc(item.titulo || '')}</h3>
                  <p>${esc(item.resumen || '')}</p>
                  ${item.url ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">Leer más →</a>` : ''}
                </div>`).join('')}
            </div>
          </div>`;
      }

      if (dato.numero || sin_filtro) {
        html += '<div class="bottom-row">';

        if (dato.numero) {
          html += `
            <div class="dato-card">
              <div class="section-tag">El dato de hoy</div>
              <div class="dato-number">${esc(dato.numero)}</div>
              <div class="dato-context">${esc(dato.contexto || '')}</div>
            </div>`;
        }

        if (sin_filtro) {
          html += `
            <div class="sinfiltro-card">
              <div class="section-tag">Sin filtro</div>
              <div class="sinfiltro-text">${esc(sin_filtro)}</div>
            </div>`;
        }

        html += '</div>';
      }

      document.getElementById('newsletter-content').innerHTML = html;
    }

    function buildArchive() {
      const grouped = {};
      newsletters.forEach(nl => {
        const key = nl.date.toLocaleDateString('es-AR', { year: 'numeric', month: 'long' });
        (grouped[key] = grouped[key] || []).push(nl);
      });

      document.getElementById('archive').innerHTML = Object.entries(grouped).map(([month, items], i) => `
        <div class="month-group">
          <div class="month-header" onclick="toggleMonth(this)">
            <span>${month}</span>
            <span class="month-toggle ${i > 0 ? 'collapsed' : ''}">▼</span>
          </div>
          <div class="newsletter-list ${i > 0 ? 'collapsed' : ''}">
            ${items.map(nl => `
              <div class="newsletter-item" data-name="${nl.name}" onclick="loadByName('${nl.name}')">
                ${nl.displayDate}
              </div>`).join('')}
          </div>
        </div>`).join('');
    }

    function toggleMonth(header) {
      header.querySelector('.month-toggle').classList.toggle('collapsed');
      header.nextElementSibling.classList.toggle('collapsed');
    }

    function loadByName(name) {
      const nl = newsletters.find(n => n.name === name);
      if (nl) loadNewsletter(nl);
      if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('open');
    }

    function showMessage(msg) {
      document.getElementById('newsletter-content').innerHTML = `<div class="loading">${msg}</div>`;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    fetchNewsletters();

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
    });
  </script>
</body>
</html>
